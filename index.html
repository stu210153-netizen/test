<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>拍照 + QR掃描</title>
  <style>
    body { text-align:center; font-family: Arial; }
    video, canvas {
      width: 90%;
      max-width: 400px;
      border: 1px solid #ccc;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
    #result {
      margin-top: 15px;
      font-size: 18px;
      color: green;
    }
  </style>
</head>
<body>

<h2>📸 拍照 + QR掃描</h2>

<video id="video" autoplay playsinline></video><br>

<button onclick="startCamera()">開啟攝影機</button>
<button onclick="takePhoto()">拍照</button>
<button onclick="stopCamera()">停止</button>

<br>
<canvas id="canvas"></canvas>

<div id="result">尚未掃描</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let stream = null;
let scanning = false;

// 開攝影機（自動適配裝置🔥）
function startCamera() {

  let isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);

  let constraints = isMobile
    ? { video: { facingMode: "environment", width: { ideal: 1280 } } }
    : { video: true };

  navigator.mediaDevices.getUserMedia(constraints)
    .then(s => {
      stream = s;
      video.srcObject = stream;
      scanning = true;
      setTimeout(scanLoop, 500);
    })
    .catch(err => {
      alert("❌ 攝影機錯誤\n" + err.name + "\n" + err.message);
    });
}

// 停止
function stopCamera() {
  scanning = false;
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
}

// 📸 拍照
function takePhoto() {
  if (!video.srcObject) {
    alert("請先開啟攝影機");
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  // 下載圖片（加分功能🔥）
  let link = document.createElement('a');
  link.download = 'photo.png';
  link.href = canvas.toDataURL();
  link.click();
}

// 🔍 掃描
function scanLoop() {
  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    let code = jsQR(imageData.data, canvas.width, canvas.height, {
      inversionAttempts: "dontInvert"
    });

    if (code) {
      document.getElementById("result").innerText =
        "✅ 掃描到：\n" + code.data;

      // 🔊 提示音（加分🔥）
      beep();

      scanning = false; // 停止一次（避免狂掃）
      return;
    }
  }

  requestAnimationFrame(scanLoop);
}

// 🔊 嗶聲
function beep() {
  let ctx = new AudioContext();
  let osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(1000, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}
</script>

</body>
</html>
